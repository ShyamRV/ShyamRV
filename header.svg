<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    </style>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F17"/>
      <stop offset="100%" stop-color="#141B26"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF9C"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>

    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF9C"/>
      <stop offset="33%" stop-color="#00D9FF"/>
      <stop offset="66%" stop-color="#B967FF"/>
      <stop offset="100%" stop-color="#FF3D81"/>
    </linearGradient>

    <pattern id="dotGrid" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1E2733"/>
    </pattern>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- base -->
  <rect width="1000" height="300" fill="url(#bgGrad)"/>
  <rect width="1000" height="300" fill="url(#dotGrid)" opacity="0.5"/>

  <!-- decorative agent-network constellation (background, abstract — purely ornamental) -->
  <g opacity="0.35" stroke-width="1">
    <line x1="700" y1="70" x2="800" y2="110" stroke="#00D9FF"/>
    <line x1="800" y1="110" x2="900" y2="80" stroke="#00D9FF"/>
    <line x1="800" y1="110" x2="830" y2="190" stroke="#B967FF"/>
    <line x1="830" y1="190" x2="930" y2="220" stroke="#B967FF"/>
    <line x1="700" y1="70" x2="660" y2="150" stroke="#00FF9C"/>
    <line x1="660" y1="150" x2="730" y2="240" stroke="#FF9933"/>
    <line x1="900" y1="80" x2="945" y2="150" stroke="#00D9FF"/>
  </g>
  <g>
    <circle cx="700" cy="70" r="4" fill="#00FF9C" filter="url(#glow)"/>
    <circle cx="800" cy="110" r="5" fill="#00D9FF" filter="url(#glow)"/>
    <circle cx="900" cy="80" r="3.5" fill="#00D9FF" opacity="0.8"/>
    <circle cx="830" cy="190" r="4.5" fill="#B967FF" filter="url(#glow)"/>
    <circle cx="930" cy="220" r="3.5" fill="#B967FF" opacity="0.8"/>
    <circle cx="660" cy="150" r="3.5" fill="#00FF9C" opacity="0.8"/>
    <circle cx="730" cy="240" r="3.5" fill="#FF9933" opacity="0.8"/>
    <circle cx="945" cy="150" r="3" fill="#00D9FF" opacity="0.7"/>
  </g>

  <!-- terminal chrome top bar -->
  <rect width="1000" height="34" fill="#0E1218"/>
  <circle cx="24" cy="17" r="5.5" fill="#00FF9C"/>
  <circle cx="44" cy="17" r="5.5" fill="#00D9FF"/>
  <circle cx="64" cy="17" r="5.5" fill="#B967FF"/>
  <text x="86" y="21" class="mono" font-size="12.5" fill="#5B6573">~/ShyamRV/README.md</text>
  <text x="970" y="21" text-anchor="end" class="mono" font-size="12" fill="#5B6573">Bengaluru, India</text>
  <line x1="0" y1="34" x2="1000" y2="34" stroke="#1E2733" stroke-width="1"/>

  <!-- avatar emblem -->
  <circle cx="130" cy="175" r="60" fill="#0B0F17" stroke="url(#nameGrad)" stroke-width="2.5"/>
  <text x="130" y="190" text-anchor="middle" class="mono" font-size="40" font-weight="800" fill="url(#nameGrad)">SP</text>
  <circle cx="130" cy="105" r="5" fill="#00FF9C" filter="url(#glow)"/>
  <line x1="130" y1="115" x2="130" y2="120" stroke="#00FF9C" stroke-width="1.5" opacity="0.7"/>
  <circle cx="62" cy="215" r="5" fill="#00D9FF" filter="url(#glow)"/>
  <line x1="80" y1="200" x2="70" y2="210" stroke="#00D9FF" stroke-width="1.5" opacity="0.7"/>
  <circle cx="198" cy="215" r="5" fill="#B967FF" filter="url(#glow)"/>
  <line x1="180" y1="200" x2="190" y2="210" stroke="#B967FF" stroke-width="1.5" opacity="0.7"/>

  <!-- name + role -->
  <text x="232" y="118" class="mono" font-size="42" font-weight="800" letter-spacing="1.5" fill="url(#nameGrad)">SHYAMJI PANDEY</text>
  <text x="232" y="148" class="mono" font-size="18" font-weight="500" fill="#00D9FF">Agentic AI Engineer · Fetch.ai</text>
  <text x="232" y="173" class="mono" font-size="13.5" fill="#8B949E">Building autonomous AI agents that take real work off humans' plates —</text>
  <text x="232" y="191" class="mono" font-size="13.5" fill="#8B949E">production-grade from day one.</text>

  <!-- status pills -->
  <g class="mono" font-size="13" font-weight="500">
    <rect x="232" y="218" width="80" height="30" rx="15" fill="#00FF9C" fill-opacity="0.12" stroke="#00FF9C" stroke-width="1"/>
    <text x="272" y="237" text-anchor="middle" fill="#00FF9C">BUILDER</text>

    <rect x="324" y="218" width="208" height="30" rx="15" fill="#00D9FF" fill-opacity="0.12" stroke="#00D9FF" stroke-width="1"/>
    <text x="428" y="237" text-anchor="middle" fill="#00D9FF">FETCH.AI · DEV ADVOCATE</text>

    <rect x="544" y="218" width="216" height="30" rx="15" fill="#B967FF" fill-opacity="0.12" stroke="#B967FF" stroke-width="1"/>
    <text x="652" y="237" text-anchor="middle" fill="#B967FF">ASI:ONE · COMMUNITY LEAD</text>

    <rect x="232" y="256" width="152" height="30" rx="15" fill="#FF9933" fill-opacity="0.12" stroke="#FF9933" stroke-width="1"/>
    <text x="308" y="275" text-anchor="middle" fill="#FF9933">BENGALURU, INDIA</text>

    <rect x="396" y="256" width="232" height="30" rx="15" fill="#FF3D81" fill-opacity="0.16" stroke="#FF3D81" stroke-width="1.25" filter="url(#glow)"/>
    <text x="512" y="275" text-anchor="middle" fill="#FF3D81" font-weight="700">OPEN TO AI ENGINEER ROLES</text>
  </g>

  <!-- bottom accent bar -->
  <rect x="0" y="296" width="1000" height="4" fill="url(#barGrad)"/>
</svg>
