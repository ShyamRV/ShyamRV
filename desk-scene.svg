<svg viewBox="0 0 1100 460" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="roomGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B0F17"/>
      <stop offset="100%" stop-color="#1A2433"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2E"/>
      <stop offset="100%" stop-color="#16243A"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF9C"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD27A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFD27A" stop-opacity="0"/>
    </radialGradient>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- room -->
  <rect width="1100" height="460" fill="url(#roomGrad)"/>
  <rect x="0" y="0" width="160" height="4" fill="url(#barGrad2)"/>
  <rect x="0" y="0" width="1100" height="1" fill="#26303F"/>

  <!-- window -->
  <rect x="860" y="40" width="170" height="130" rx="6" fill="url(#skyGrad)" stroke="#26303F" stroke-width="3"/>
  <rect x="943" y="40" width="4" height="130" fill="#26303F"/>
  <rect x="860" y="103" width="170" height="4" fill="#26303F"/>
  <g fill="#BFE9FF">
    <circle cx="885" cy="65" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="915" cy="80" r="1.6"><animate attributeName="opacity" values="1;0.2;1" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="970" cy="60" r="1.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="85" r="1.6"><animate attributeName="opacity" values="1;0.3;1" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="135" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="1005" cy="140" r="1.6"><animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- shelf -->
  <rect x="120" y="168" width="290" height="9" fill="#6B4226"/>
  <rect x="120" y="177" width="290" height="4" fill="#000" opacity="0.25"/>

  <!-- shelf: plant -->
  <polygon points="132,168 166,168 160,146 138,146" fill="#B5654A"/>
  <ellipse cx="149" cy="138" rx="14" ry="9" fill="#2FAE6B"/>
  <ellipse cx="138" cy="143" rx="10" ry="7" fill="#27955C"/>
  <ellipse cx="160" cy="143" rx="10" ry="7" fill="#27955C"/>

  <!-- shelf: round agent bot -->
  <circle cx="206" cy="148" r="20" fill="#0D1117" stroke="#00FF9C" stroke-width="2"/>
  <line x1="206" y1="128" x2="206" y2="120" stroke="#00FF9C" stroke-width="2"/>
  <circle cx="206" cy="118" r="3" fill="#00FF9C" filter="url(#g)"/>
  <circle cx="198" cy="148" r="3" fill="#fff"/>
  <circle cx="214" cy="148" r="3" fill="#fff"/>
  <path d="M198,158 Q206,163 214,158" stroke="#00FF9C" stroke-width="2" fill="none"/>

  <!-- shelf: square agent bot -->
  <rect x="252" y="128" width="38" height="38" rx="8" fill="#0D1117" stroke="#00D9FF" stroke-width="2"/>
  <circle cx="271" cy="145" r="7" fill="#00D9FF"/>
  <line x1="271" y1="156" x2="271" y2="160" stroke="#00D9FF" stroke-width="2"/>
  <line x1="262" y1="160" x2="280" y2="160" stroke="#00D9FF" stroke-width="2"/>

  <!-- shelf: circuit card -->
  <rect x="320" y="118" width="50" height="62" rx="3" fill="#11161D" stroke="#B967FF" stroke-width="2"/>
  <g fill="#B967FF" opacity="0.8">
    <circle cx="333" cy="132" r="2"/><circle cx="357" cy="132" r="2"/>
    <circle cx="333" cy="150" r="2"/><circle cx="357" cy="150" r="2"/>
    <circle cx="345" cy="141" r="2"/><circle cx="345" cy="164" r="2"/>
    <line x1="333" y1="132" x2="345" y2="141" stroke="#B967FF" stroke-width="1"/>
    <line x1="357" y1="132" x2="345" y2="141" stroke="#B967FF" stroke-width="1"/>
    <line x1="333" y1="150" x2="345" y2="141" stroke="#B967FF" stroke-width="1"/>
    <line x1="357" y1="150" x2="345" y2="141" stroke="#B967FF" stroke-width="1"/>
  </g>

  <!-- neon sign -->
  <line x1="600" y1="18" x2="600" y2="68" stroke="#3A4456" stroke-width="2"/>
  <line x1="700" y1="18" x2="700" y2="68" stroke="#3A4456" stroke-width="2"/>
  <g filter="url(#g)">
    <rect x="588" y="66" width="124" height="46" rx="8" fill="#0D1117" stroke="#FF3D81" stroke-width="2"/>
    <text x="650" y="96" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="18" font-weight="700" fill="#FF3D81">{ AI }</text>
    <animate attributeName="opacity" values="1;1;0.35;1;1;0.5;1" keyTimes="0;0.55;0.6;0.65;0.85;0.88;1" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- main monitor -->
  <rect x="460" y="150" width="300" height="200" rx="10" fill="#05070B" stroke="#26303F" stroke-width="3"/>
  <rect x="476" y="166" width="268" height="150" rx="4" fill="#0B1F1C"/>
  <rect x="490" y="182" width="120" height="7" rx="2" fill="#00D9FF"/>
  <rect x="490" y="200" width="80"  height="7" rx="2" fill="#8B949E"/>
  <rect x="490" y="218" width="150" height="7" rx="2" fill="#00FF9C"/>
  <rect x="490" y="236" width="60"  height="7" rx="2" fill="#B967FF"/>
  <rect x="490" y="254" width="140" height="7" rx="2" fill="#8B949E"/>
  <rect x="490" y="272" width="40"  height="7" rx="2" fill="#FF9933"/>
  <rect x="534" y="272" width="6" height="9" fill="#00FF9C">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>
  <rect x="595" y="350" width="20" height="22" fill="#26303F"/>
  <rect x="560" y="372" width="90" height="8" rx="3" fill="#26303F"/>

  <!-- side screen -->
  <rect x="170" y="258" width="170" height="120" rx="6" fill="#05070B" stroke="#26303F" stroke-width="2"/>
  <rect x="182" y="270" width="146" height="96" rx="3" fill="#0B1A2E"/>
  <polyline points="190,330 215,310 240,335 265,300 290,320 315,305" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.85"/>
  <polyline points="190,345 215,335 240,350 265,325 290,340 315,328" fill="none" stroke="#B967FF" stroke-width="2" opacity="0.6"/>
  <rect x="245" y="378" width="20" height="14" fill="#26303F"/>

  <!-- desk -->
  <rect x="40" y="392" width="1020" height="28" fill="#4A2F22"/>
  <rect x="40" y="418" width="1020" height="10" fill="#3A2419"/>
  <rect x="58" y="424" width="16" height="30" fill="#2B1C14"/>
  <rect x="1026" y="424" width="16" height="30" fill="#2B1C14"/>

  <!-- character (back view) -->
  <rect x="470" y="296" width="120" height="118" rx="22" fill="#7A3B52"/>
  <rect x="482" y="326" width="98" height="84" rx="18" fill="#363B52"/>
  <circle cx="531" cy="296" r="33" fill="#241B14"/>
  <rect x="556" y="356" width="68" height="16" rx="8" fill="#363B52"/>
  <circle cx="624" cy="364" r="8" fill="#C99B72"/>

  <!-- keyboard + mouse -->
  <rect x="560" y="396" width="120" height="16" rx="3" fill="#11161D" stroke="#26303F" stroke-width="1.5"/>
  <rect x="697" y="398" width="22" height="14" rx="6" fill="#11161D" stroke="#26303F" stroke-width="1.5"/>

  <!-- headphones on monitor -->
  <path d="M748,170 Q748,140 778,140 Q808,140 808,170" stroke="#26303F" stroke-width="4" fill="none"/>
  <rect x="740" y="166" width="14" height="22" rx="6" fill="#B967FF"/>
  <rect x="802" y="166" width="14" height="22" rx="6" fill="#B967FF"/>

  <!-- mug + steam -->
  <rect x="762" y="392" width="28" height="24" rx="4" fill="#00D9FF" opacity="0.9"/>
  <path d="M790,396 q10,4 0,16" stroke="#00D9FF" stroke-width="3" fill="none" opacity="0.9"/>
  <ellipse cx="774" cy="382" rx="4" ry="7" fill="#fff" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-18" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0" dur="2.6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="780" cy="386" rx="3" ry="6" fill="#fff" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-16" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>
  </ellipse>

  <!-- desk lamp -->
  <ellipse cx="900" cy="400" rx="55" ry="18" fill="url(#lampGlow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3.2s" repeatCount="indefinite"/>
  </ellipse>
  <rect x="893" y="392" width="14" height="10" fill="#1E2733"/>
  <line x1="900" y1="392" x2="900" y2="330" stroke="#1E2733" stroke-width="5"/>
  <line x1="900" y1="330" x2="862" y2="318" stroke="#1E2733" stroke-width="5"/>
  <polygon points="846,300 880,300 888,322 838,322" fill="#FF9933"/>

  <!-- desk agent companion -->
  <circle cx="838" cy="402" r="15" fill="#0D1117" stroke="#B967FF" stroke-width="2"/>
  <circle cx="838" cy="402" r="4.5" fill="#00FF9C">
    <animate attributeName="fill" values="#00FF9C;#00D9FF;#B967FF;#00FF9C" dur="4s" repeatCount="indefinite"/>
  </circle>
  <line x1="838" y1="387" x2="838" y2="382" stroke="#B967FF" stroke-width="2"/>
  <circle cx="838" cy="380" r="2.5" fill="#B967FF" filter="url(#g)"/>

  <!-- desk plant -->
  <polygon points="78,392 104,392 99,372 83,372" fill="#B5654A"/>
  <ellipse cx="91" cy="365" rx="11" ry="8" fill="#2FAE6B"/>
  <ellipse cx="82" cy="370" rx="8" ry="6" fill="#27955C"/>
  <ellipse cx="100" cy="370" rx="8" ry="6" fill="#27955C"/>

  <!-- ambient data bits -->
  <g>
    <rect x="430" y="90" width="4" height="4" fill="#00FF9C" opacity="0.5"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite"/></rect>
    <rect x="780" y="130" width="4" height="4" fill="#00D9FF" opacity="0.5"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.4s" repeatCount="indefinite"/></rect>
    <rect x="200" y="90" width="4" height="4" fill="#B967FF" opacity="0.5"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3.6s" repeatCount="indefinite"/></rect>
    <rect x="1000" y="200" width="4" height="4" fill="#FF9933" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.8s" repeatCount="indefinite"/></rect>
  </g>

  <!-- floor -->
  <rect x="0" y="428" width="1100" height="32" fill="#05070B"/>
</svg>
